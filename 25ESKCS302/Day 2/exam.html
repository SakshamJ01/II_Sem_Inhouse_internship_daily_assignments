<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ADMISSION FORM</title>
</head>
<body>
    <H2> SKIT ADMISSION FORM</H2>
    <a href="https://www.skit.ac.in/" target="_main"><img src="/skit.png" height="100" width="100" alt="skit logo"></a>
    <BR>
        <form>
 <div 1>
            <input type="text" placeholder="Enter your full name" required>
            <br><br>        
            <input type="email" placeholder="Enter your email" required>
            <br><br>
            <input type="date" placeholder="Enter your date of birth" required> DOB
 </div 1>
<br><br>
<div 2>
<h4>SELECT YOUR GENDER</h4>
<BR>
<input type="radio" value="Male" name="gender" id="1">
<label for="1">MALE</label>
<br><br><br>

<input type="radio" value="Female" name="gender" id="2">
<label for="2">FEMALE</label>
<BR><br>
</div 2>
<br><br>
<div 3>
    <h4>SELECT YOUR CITY</h4>
<br><br>
    <select NAME="CITY">
        <option VALUE="Delhi">DELHI</option>
        <option VALUE="Mumbai">MUMBAI</option>  
        <option VALUE="Kolkata">KOLKATA</option>
        <option VALUE="Jaipur">JAIPIUR</option>
        <option VALUE="Amedhabad">MUMBAI</option>  
        <option VALUE="Pune">KOLKATA</option>
    </select>
<br><br>
</div 3>
<br><br>
<div 4>
<h4>SELECT YOUR CATEGORY</h4>
<br><br>
<input type="radio" value="GEN" name="category" id="gen">
<label for="gen">GEN</label>

<input type="radio" value="OBC" name="category" id="obc">
<label for="obc">OBC</label>        

<input type="radio" value="SC" name="category" id="sc">
<label for="sc">SC</label>

<input type="radio" value="OTHER" name="category" id="other">
<label for="other">OTHER</label>
<br>
</div 4>
<H4>ACADEMIC DETAILS</H4>

CLASS 12TH PERCENTAGE <input TYPE="TEXT" PLACEHOLDER="12th %"> 
<br><br>
JEE RANK  <input TYPE="TEXT" PLACEHOLDER="JEE Rank"> 
JEE (%il) <input TYPE="TEXT" PLACEHOLDER="JEE %ile"> 
<br><br>
<h4>SELECT YOUR BRANCH</h4>
<BR>
<select id="course" name="BRANCH" required>
    <option VALUE="CSE">CSE</option>
    <option VALUE="ECE">ECE</option>
    <option VALUE="ME">MECHANICAL</option>
    <OPTION VALUE="CIVIL">CIVIL</OPTION>
    <optgroup label="OTHER BRANCHES">
    <option VALUE="CHEMICAL">CHEMICAL</option>
    <option VALUE="BIOTECH">BIOTECH</option>
    <option VALUE="PHARMACY">PHARMACY</option>
</select> 
<br><br>

<textarea name="message" rows="5" cols="50" placeholder="why choose SKIT?"></textarea>
<br><br>

 <button type="submit">submit</button> <i>THANK YOU</i>
        </form>
         
</body>
</html>
