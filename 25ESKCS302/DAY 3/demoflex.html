<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style> 
        .container{
              border: 1px solid black;
            height: 300px;
            display: flex;
            flex-direction: row;  
            justify-content:space-evenly;  
         align-items:self-start;
        }
        
        .item{
            border: 1px solid black;
            background-color: rgb(89, 237, 171);
            text-align: center;
            width: 50px;      
        }
        .item:nth-child(odd){
            background-color: rgba(9, 15, 12, 0.137);
        }

    </style>
</head>
<body>
    <h2>
        flex box
    </h2>
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>        
    </div>
    <a href="flex.html">click here to go to flex.html</a>
</body>
</html>
